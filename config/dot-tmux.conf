# Use Homebrew Bash on macOS if available
if-shell '[[ $(uname) = Darwin && -x /opt/homebrew/bin/bash ]]' \
  "set-option -g default-shell /opt/homebrew/bin/bash"
# 256-color + UTF 8
set -g default-terminal "tmux-256color"

# Enable mouse support
set -g mouse on

# Enable focus events (needed for vim/neovim to detect focus changes)
set -g focus-events on

# Improve responsivenenss
set -sg escape-time 15

# Enable vi mode
set-window-option -g mode-keys vi

# Increase scrollback buffer size
set -g history-limit 10000

# Easy config reload
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded!"

# Use external copy script for clipboard integration
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "tmux-copy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "tmux-copy"

# Create gutter terminal (full width)
bind-key F split-window -f -l 10 -c "#{pane_current_path}"

# Popup scratch shell (persistent session - fast reattach)
bind-key S display-popup -E "tmux new-session -A -s scratch -c ~"

# Cheat sheet popup (overrides default key-lookup binding)
bind-key / display-popup -E -w 50 -h 80% "less $HOME/Code/github.com/mbailey/tmux/docs/cheat.md"

# Split panes and inherit current working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Theme configuration
# Source theme file if it exists (created by tmux-theme-apply)
if-shell 'test -f ~/.tmux.theme' 'source-file ~/.tmux.theme'

# Auto-apply theme on startup and periodically
run-shell -b 'command -v tmux-theme-apply >/dev/null 2>&1 && tmux-theme-apply'

# Manual theme toggle keybinding
bind T run-shell 'if [ "$(tmux-theme-detect)" = "dark" ]; then echo "light" > ~/.terminal-theme; else echo "dark" > ~/.terminal-theme; fi; tmux-theme-apply'

# Status bar configuration
set -g status-interval 1
set -g status-left-length 25
set -g status-right-length 100
set -g status-right '#(tmux-mpv-status) %H:%M %d-%b-%y'
