# Light theme for tmux

# Status bar colors
set -g status-style 'bg=#eff1f5 fg=#4c4f69'

# Window status
set -g window-status-style 'bg=#eff1f5 fg=#5c5f77'
set -g window-status-current-style 'bg=#dce0e8 fg=#dc8a78 bold'

# Pane borders
set -g pane-border-style 'fg=#bcc0cc'
set -g pane-active-border-style 'fg=#1e66f5'

# Message colors
set -g message-style 'bg=#dce0e8 fg=#4c4f69'
set -g message-command-style 'bg=#dce0e8 fg=#4c4f69'

# Clock
set -g clock-mode-colour '#1e66f5'

# Copy mode highlighting
set -g mode-style 'bg=#ccd0da fg=#4c4f69'