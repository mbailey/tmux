# Remap prefix from 'C-b' to 'C-a'
# unbind C-b
# set-option -g prefix C-a
# bind-key C-a send-prefix

# Enable mouse support
set -g mouse on

# Window splitting
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes with arrow keys (with prefix)
bind Left resize-pane -L 5
bind Right resize-pane -R 5
bind Up resize-pane -U 5
bind Down resize-pane -D 5

# Window navigation
bind c new-window
bind [ previous-window
bind ] next-window

# Quick window selection
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Enable vi mode
set-window-option -g mode-keys vi

# Increase scrollback buffer size
set -g history-limit 10000

# Don't rename windows automatically
set-option -g allow-rename off

# Use external copy script for clipboard integration
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "tmux-copy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "tmux-copy"

# Popup shell
bind-key S display-popup -E "$SHELL"

 # Easy config reload
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded!"

# Bottom shell panel controls
# C-Space: Create if missing -> Show at 25% if hidden -> Toggle 25%/full
bind-key -n C-Space run-shell '\
  if ! tmux list-panes -F "#{pane_id}" | grep -q "^#{@shell_pane}$"; then \
    tmux split-window -f -v -p 25 -c "#{pane_current_path}"; \
    tmux set @shell_pane "#{pane_id}"; \
  elif [ "$(tmux display -p "#{pane_at_bottom}")" = "1" ]; then \
    tmux if-shell -F "#{==:#{pane_height},#{window_height}}" \
      "resize-pane -y 25%" \
      "resize-pane -Z"; \
  else \
    tmux select-pane -t "#{@shell_pane}"; \
  fi'

# C-x: Hide the shell panel
bind-key -n C-x if-shell -F '#{==:#{pane_id},#{@shell_pane}}' \
  'break-pane -d -n shell_hidden' ''

