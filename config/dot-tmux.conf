# Use Homebrew Bash on macOS if available
if-shell '[[ $(uname) = Darwin && -x /opt/homebrew/bin/bash ]]' \
  "set-option -g default-shell /opt/homebrew/bin/bash"
# 256-color + UTF 8
set -g default-terminal "tmux-256color"

# Enable mouse support
set -g mouse on

# Enable focus events (needed for vim/neovim to detect focus changes)
set -g focus-events on

# Improve responsivenenss
set -sg escape-time 15

# Enable vi mode
set-window-option -g mode-keys vi

# Increase scrollback buffer size
set -g history-limit 10000

# Easy config reload
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded!"

# Use external copy script for clipboard integration
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "tmux-copy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "tmux-copy"

# Create gutter terminal (full width)
bind-key F split-window -f -l 10 -c "#{pane_current_path}"

# Popup shell
bind-key S display-popup -E "$SHELL"

# Split panes and inherit current working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Status bar configuration
set -g status-interval 30
set -g status-right-length 100
set -g status-right '#(~/public/tmux/bin/tmux-github-stats #{pane_current_path}) #[default]| %H:%M %d-%b-%y'
